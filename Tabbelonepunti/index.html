<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coppa delle Confraternite - Alba di Estel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #d4af37;
      /* Aramitas: Bianco, verde chiaro e oro pallido */
      --ara: linear-gradient(135deg, rgba(144,238,144,0.15) 0%, transparent 100%);
      --ara-b: #eee8aa;
      /* Shelby: Viola */
      --she: linear-gradient(135deg, rgba(147,112,219,0.15) 0%, transparent 100%);
      --she-b: #9370db;
      /* Shamash: Blu profondo e argento */
      --sha: linear-gradient(135deg, rgba(0,31,63,0.35) 0%, transparent 100%);
      --sha-b: #c0c0c0;
      /* Derek: Rosso e blu */
      --der: linear-gradient(135deg, rgba(139,0,0,0.15) 0%, rgba(0,0,139,0.1) 100%);
      --der-b: #cd5c5c;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: #050505;
      background-image: radial-gradient(circle at 50% 50%, #1a120b, #050505);
      color: #e9dcc6;
      font-family: 'Cinzel', serif;
      padding: 40px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .academy-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .academy-header h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.8rem, 8vw, 4rem);
      background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
      text-transform: uppercase;
      line-height: 1.1;
    }

    .ranking-container {
      width: min(1200px, 100%);
      display: flex;
      flex-direction: column;
      gap: 35px;
    }

    /* RIGA DESKTOP / CARTA MOBILE */
    .guild-row {
      display: flex;
      align-items: center;
      background: #0a0a0a;
      border: 1px solid rgba(212, 175, 55, 0.15);
      box-shadow: 10px 10px 30px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .guild-row::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--guild-grad);
      pointer-events: none;
    }

    /* CORNICE LOGO ARALDICA */
    .heraldic-frame {
      width: 180px;
      height: 180px;
      padding: 8px;
      background: #000;
      border: 3px solid var(--guild-border);
      box-shadow: 0 0 20px var(--guild-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin: 20px;
      z-index: 2;
    }

    .heraldic-frame img { width: 100%; height: 100%; object-fit: cover; }

    .guild-info {
      flex: 1;
      padding: 10px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }

    .name-motto h2 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: #fff;
      text-shadow: 2px 2px 4px #000;
    }

    .name-motto p {
      font-size: 0.75rem;
      color: var(--guild-border);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 5px;
    }

    .score-val {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      color: #fff;
      text-shadow: 0 0 25px var(--guild-border);
    }

    /* CLASSI IDENTITÀ */
    .aramitas { --guild-grad: var(--ara); --guild-border: var(--ara-b); }
    .schelby  { --guild-grad: var(--she); --guild-border: var(--she-b); }
    .shamash  { --guild-grad: var(--sha); --guild-border: var(--sha-b); }
    .derek    { --guild-grad: var(--der); --guild-border: var(--der-b); }

    /* --- OTTIMIZZAZIONE MOBILE: LA SVOLTA --- */
    @media (max-width: 800px) {
      body { padding: 30px 10px; }
      
      .ranking-container { gap: 40px; }

      .guild-row {
        flex-direction: column;
        padding: 30px 15px;
        border-radius: 10px;
        text-align: center;
      }

      .guild-row::before {
        /* Gradiente verticale per mobile per non tagliare il colore */
        background: linear-gradient(180deg, var(--guild-border) -300%, transparent 100%);
      }

      .heraldic-frame {
        width: 220px; /* Logo più grande su mobile */
        height: 220px;
        margin: 0 0 20px 0;
      }

      .guild-info {
        flex-direction: column;
        padding: 0;
        gap: 20px;
        width: 100%;
      }

      .name-motto h2 { font-size: 2rem; }
      
      .guild-score {
        width: 100%;
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        padding-top: 15px;
      }
      
      .score-val { font-size: 5rem; }
    }

    .guild-row:hover { transform: scale(1.02); }
  </style>
</head>
<body>

  <header class="academy-header">
    <h1>Coppa delle Confraternite</h1>
    <p>Del Collegio dell'Alba di Estel</p>
  </header>

  <main class="ranking-container" id="leaderboard">
    
    <article class="guild-row aramitas">
      <div class="heraldic-frame"><img src="Aramitas-logo.png"></div>
      <div class="guild-info">
        <div class="name-motto"><p>Parte del ciclo della natura, essa li osserva</p><h2>Aramitas</h2></div>
        <div class="guild-score"><span class="score-val">850</span></div>
      </div>
    </article>

    <article class="guild-row shamash">
      <div class="heraldic-frame"><img src="Shamash-logo.png"></div>
      <div class="guild-info">
        <div class="name-motto"><p>Ciò che è custodito non verrà mai dimenticato</p><h2>Shamash</h2></div>
        <div class="guild-score"><span class="score-val">728</span></div>
      </div>
    </article>

    <article class="guild-row schelby">
      <div class="heraldic-frame"><img src="schelby-logo.png"></div>
      <div class="guild-info">
        <div class="name-motto"><p>Il mondo non è giusto, Noi Nemmeno</p><h2>Shelby</h2></div>
        <div class="guild-score"><span class="score-val">720</span></div>
      </div>
    </article>

    <article class="guild-row derek">
      <div class="heraldic-frame"><img src="Derek-logo.png"></div>
      <div class="guild-info">
        <div class="name-motto"><p>Resistere e Vittoria</p><h2>Martello Saldo</h2></div>
        <div class="guild-score"><span class="score-val">604</span></div>
      </div>
    </article>

  </main>

  <script>
    function sortBoard() {
      const container = document.getElementById('leaderboard');
      const rows = Array.from(container.querySelectorAll('.guild-row'));
      rows.sort((a, b) => {
        return parseInt(b.querySelector('.score-val').textContent) - parseInt(a.querySelector('.score-val').textContent);
      });
      rows.forEach(row => container.appendChild(row));
    }
    window.onload = sortBoard;
  </script>

</body>
</html>
